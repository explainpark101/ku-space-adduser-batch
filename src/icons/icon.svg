<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경: 고려대학교 크림슨 색상 -->
  <rect width="128" height="128" rx="24" fill="#A50034"/>
  
  <!-- 텍스트 설정: 중앙 정렬 및 굵은 글씨 -->
  <style>
    .text-bold { 
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; 
      font-weight: 800; 
      fill: #FFFFFF; 
      text-anchor: middle; 
      dominant-baseline: middle; 
    }
  </style>

  <!-- 텍스트 배치: 2줄 구성으로 가독성 확보 -->
  <text x="64" y="45" font-size="38" class="text-bold">공간</text>
  <text x="64" y="85" font-size="38" class="text-bold">예약</text>
</svg>